<svg xmlns="http://www.w3.org/2000/svg" width="1216" height="240" viewBox="0 0 1216 240" data-template-type="formula_block_png" data-content-type="formula_step" data-formula-id="{{formula_id}}">
  <metadata id="formula-block-contract">
    Formula analysis template rebuilt from the user supplied formula SVG example. The visible block is a real design reference instead of a blank shell, while formula role, equation, and variable interpretation still bind through one rendered PNG.
    Bind formula_block_png_href to a transparent PNG created by scripts/latex_formula_to_png.py --block-json. Keep data-formula-png and data-formula-block-png on the image slot so SVG-to-DrawingML packages the PNG into PPTX media.
    Add gray 1.5pt dashed separator lines outside this template when stacking multiple formula blocks on a slide.
  </metadata>
  <defs>
    <filter id="themeBlockShadow" x="-4%" y="-8%" width="108%" height="116%" data-pptx-shadow="outer" data-pptx-shadow-transparency="0.60" data-pptx-shadow-size="102" data-pptx-shadow-blur-pt="5" data-pptx-shadow-angle="0" data-pptx-shadow-distance-pt="0">
      <feDropShadow dx="0" dy="0.01" stdDeviation="3.75" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
  </defs>
  <rect id="formula-analysis-card" data-shape-block="true" x="0" y="0" width="1216" height="240" rx="6" fill="#FFFFFF" stroke="#D9DEE8" stroke-width="1.5" filter="url(#themeBlockShadow)"/>
  <rect id="formula-analysis-accent" x="0" y="0" width="8" height="240" rx="4" fill="#2F5597"/>
  <rect id="formula-title-band" x="24" y="18" width="1168" height="34" rx="6" fill="#EEF3FA" stroke="#D9E3F2" stroke-width="1"/>
  <text id="formula-analysis-label" x="56" y="40" font-size="18" font-weight="700" fill="#203864" font-family="Microsoft YaHei, Arial, sans-serif" data-box-x="48" data-box-y="23" data-box-width="240" data-box-height="24">公式分析</text>
  <line id="formula-title-rule" x1="280" y1="35" x2="1172" y2="35" stroke="#B8C7DD" stroke-width="1.5" stroke-dasharray="8 6"/>
  <rect id="formula-png-frame" x="24" y="66" width="1168" height="154" rx="6" fill="#FFFFFF" stroke="#ECF0F5" stroke-width="1"/>
  <image id="formula-block-png-slot" data-formula-png="true" data-formula-block-png="true" href="{{formula_block_png_href}}" x="40" y="78" width="1136" height="130" preserveAspectRatio="xMidYMid meet"/>
  <line id="formula-footer-rule" x1="24" y1="224" x2="1192" y2="224" stroke="#A6A6A6" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.85"/>
</svg>
