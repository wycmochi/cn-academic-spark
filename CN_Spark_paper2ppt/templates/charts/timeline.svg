<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!-- 
    Timeline / Roadmap Template
    Purpose: Chronological event display and project planning
    Use cases: Product roadmaps, historical milestones, project plans
    Feature: Mathematical symmetry, glowing tracks, status-based semantic styling
    -->
    <defs>
        <!-- Track Gradient: Solid Emerald up to Node 3, transitioning to Indigo at Node 4 -->
        <linearGradient id="trackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#10B981"/>
            <stop offset="68.8%" stop-color="#10B981"/>
            <stop offset="100%" stop-color="#6366F1"/>
        </linearGradient>
        <!-- Node Glow Shadows -->
        <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feFlood flood-color="#0F172A" flood-opacity="0.15" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge>
                <feMergeNode in="shadow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <!-- Card Drop Shadow -->
        <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feFlood flood-color="#0F172A" flood-opacity="0.06" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge>
                <feMergeNode in="shadow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Background -->
    <rect width="1280" height="720" fill="#FAFBFC"/>
    <!-- ==================== Header ==================== -->
    <text x="60" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="#0F172A">Product Development Roadmap</text>
    <text x="60" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#64748B" letter-spacing="1">2024 - 2026 · KEY MILESTONES</text>
    <!-- ==================== Legend ==================== -->
    <g transform="translate(880, 65)">
        <circle cx="0" cy="10" r="8" fill="#10B981"/>
        <path d="M -3,10 L 0,13 L 4,7" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
        <text x="15" y="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#475569">Completed</text>
        <circle cx="110" cy="10" r="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="2.5"/>
        <circle cx="110" cy="10" r="4" fill="#6366F1"/>
        <text x="125" y="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#475569">In Progress</text>
        <circle cx="230" cy="10" r="7" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2.5"/>
        <text x="245" y="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#475569">Planned</text>
    </g>
    <!-- ==================== Timeline Track ==================== -->
    <g id="timelineTrack">
        <!-- Base Future Track -->
        <line x1="120" y1="360" x2="1160" y2="360" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round"/>
        <!-- Active Progress Track -->
        <line x1="120" y1="360" x2="736" y2="360" stroke="url(#trackGrad)" stroke-width="8" stroke-linecap="round"/>
    </g>
    <!-- ==================== Nodes & Connections ==================== -->
    <!-- Node 1: Completed -->
    <line x1="160" y1="304" x2="160" y2="340" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>
    <g>
        <circle cx="160" cy="360" r="24" fill="#10B981" opacity="0.15"/>
        <circle cx="160" cy="360" r="16" fill="#10B981" filter="url(#nodeShadow)"/>
        <path d="M 154,360 L 158,365 L 166,355" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Node 2: Completed -->
    <line x1="352" y1="380" x2="352" y2="416" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>
    <g>
        <circle cx="352" cy="360" r="24" fill="#10B981" opacity="0.15"/>
        <circle cx="352" cy="360" r="16" fill="#10B981" filter="url(#nodeShadow)"/>
        <path d="M 346,360 L 350,365 L 358,355" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Node 3: Completed -->
    <line x1="544" y1="304" x2="544" y2="340" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>
    <g>
        <circle cx="544" cy="360" r="24" fill="#10B981" opacity="0.15"/>
        <circle cx="544" cy="360" r="16" fill="#10B981" filter="url(#nodeShadow)"/>
        <path d="M 538,360 L 542,365 L 550,355" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Node 4: In-Progress -->
    <line x1="736" y1="380" x2="736" y2="416" stroke="#6366F1" stroke-width="2" stroke-dasharray="4,4"/>
    <g>
        <circle cx="736" cy="360" r="26" fill="#6366F1" opacity="0.2" filter="url(#nodeShadow)"/>
        <circle cx="736" cy="360" r="16" fill="#FFFFFF" stroke="#6366F1" stroke-width="4"/>
        <circle cx="736" cy="360" r="7" fill="#6366F1"/>
    </g>
    <!-- Node 5: Planned -->
    <line x1="928" y1="304" x2="928" y2="340" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,4"/>
    <g>
        <circle cx="928" cy="360" r="14" fill="#FFFFFF" stroke="#94A3B8" stroke-width="3" filter="url(#nodeShadow)"/>
    </g>
    <!-- Node 6: Planned -->
    <line x1="1120" y1="380" x2="1120" y2="416" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,4"/>
    <g>
        <circle cx="1120" cy="360" r="14" fill="#FFFFFF" stroke="#94A3B8" stroke-width="3" filter="url(#nodeShadow)"/>
    </g>
    <!-- ==================== Cards ==================== -->
    <!-- Card 1 -->
    <g id="card1">
        <rect x="70" y="180" width="180" height="120" rx="12" fill="#FFFFFF" stroke="#10B981" stroke-width="2" filter="url(#cardShadow)"/>
        <text x="160" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#10B981" text-anchor="middle">2024 Q1</text>
        <text x="160" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#0F172A" text-anchor="middle">Project Initiation</text>
        <text x="160" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#64748B" text-anchor="middle">Requirement analysis</text>
        <text x="160" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#64748B" text-anchor="middle">Technical architecture</text>
    </g>
    <!-- Card 2 -->
    <g id="card2">
        <rect x="262" y="420" width="180" height="120" rx="12" fill="#FFFFFF" stroke="#10B981" stroke-width="2" filter="url(#cardShadow)"/>
        <text x="352" y="455" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#10B981" text-anchor="middle">2024 Q2</text>
        <text x="352" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#0F172A" text-anchor="middle">MVP Development</text>
        <text x="352" y="505" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#64748B" text-anchor="middle">Core features launch</text>
        <text x="352" y="525" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#64748B" text-anchor="middle">Alpha testing</text>
    </g>
    <!-- Card 3 -->
    <g id="card3">
        <rect x="454" y="180" width="180" height="120" rx="12" fill="#FFFFFF" stroke="#10B981" stroke-width="2" filter="url(#cardShadow)"/>
        <text x="544" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#10B981" text-anchor="middle">2024 Q3</text>
        <text x="544" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#0F172A" text-anchor="middle">Public Beta</text>
        <text x="544" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#64748B" text-anchor="middle">Open registration</text>
        <text x="544" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#64748B" text-anchor="middle">Target 5,000+ users</text>
    </g>
    <!-- Card 4 (In Progress) -->
    <g id="card4">
        <rect x="646" y="420" width="180" height="120" rx="12" fill="#FFFFFF" stroke="#6366F1" stroke-width="2.5" filter="url(#cardShadow)"/>
        <rect x="646" y="420" width="180" height="6" rx="3" fill="#6366F1"/>
        <text x="736" y="455" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#4338CA" text-anchor="middle">2024 Q4</text>
        <text x="736" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#0F172A" text-anchor="middle">Feature Iteration</text>
        <text x="736" y="505" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#64748B" text-anchor="middle">AI integration</text>
        <text x="736" y="525" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#64748B" text-anchor="middle">Multi-platform sync</text>
        <!-- Status Pill overlapping bottom border -->
        <rect x="691" y="528" width="90" height="24" rx="12" fill="#6366F1"/>
        <text x="736" y="544" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">IN PROGRESS</text>
    </g>
    <!-- Card 5 -->
    <g id="card5">
        <rect x="838" y="180" width="180" height="120" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#cardShadow)"/>
        <text x="928" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#64748B" text-anchor="middle">2025 Q2</text>
        <text x="928" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#334155" text-anchor="middle">Commercialization</text>
        <text x="928" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#94A3B8" text-anchor="middle">Premium tiers launch</text>
        <text x="928" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#94A3B8" text-anchor="middle">Marketing campaign</text>
    </g>
    <!-- Card 6 -->
    <g id="card6">
        <rect x="1030" y="420" width="180" height="120" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#cardShadow)"/>
        <text x="1120" y="455" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#64748B" text-anchor="middle">2026 Q1</text>
        <text x="1120" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#334155" text-anchor="middle">Scale-up</text>
        <text x="1120" y="505" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#94A3B8" text-anchor="middle">Global expansion</text>
        <text x="1120" y="525" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#94A3B8" text-anchor="middle">Ecosystem building</text>
    </g>
    <!-- ==================== Footer ==================== -->
    <text x="60" y="690" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#94A3B8">Data Source: Product Management Dept</text>
</svg>
